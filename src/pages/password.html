<div id="password-scene" class="fixed inset-0 flex flex-col items-center justify-center bg-bg">
  <!-- Language toggle -->
  <button id="pw-lang-toggle"
          class="fixed top-6 right-6 z-50 text-xs tracking-widest uppercase text-fg-muted hover:text-fg transition-colors duration-500 cursor-pointer">
  </button>

  <!-- Logo / Monogram -->
  <div id="pw-logo" class="mb-12">
    <div class="text-center select-none">
      <span class="font-heading text-6xl md:text-8xl tracking-wide text-fg">D</span>
      <span class="font-heading text-4xl md:text-6xl text-accent mx-2">&amp;</span>
      <span class="font-heading text-6xl md:text-8xl tracking-wide text-fg">J</span>
    </div>
  </div>

  <!-- Password form -->
  <div id="pw-form" class="flex flex-col items-center gap-6">
    <input
      id="pw-input"
      type="password"
      autocomplete="off"
      class="w-48 bg-transparent border-b border-fg/20 focus:border-fg/50
             text-center text-sm tracking-wider py-2 outline-none transition-colors duration-500
             placeholder:text-fg/25 placeholder:tracking-widest placeholder:text-xs"
    />
    <button
      id="pw-submit"
      class="text-xs tracking-[0.3em] uppercase text-fg/40
             hover:text-fg transition-colors duration-500 cursor-pointer"
    ></button>
    <p id="pw-error" class="text-red-700/70 text-xs tracking-wide opacity-0 transition-opacity duration-500"></p>
  </div>
</div>
